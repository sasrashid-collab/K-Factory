<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Store | AI Factory</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f2027;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 2.5em; }
        
        /* بەشی کۆگاکان */
        .store-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .store-card { background: var(--card-bg); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .store-card:hover { border-color: var(--primary); background: rgba(0, 210, 255, 0.1); }
        .store-card i { font-size: 24px; display: block; margin-bottom: 5px; }

        /* بەشی کامێرا */
        .video-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto 20px; border: 3px solid var(--primary); border-radius: 20px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }

        /* بەشی دروستکردنی ئەپ */
        .build-section { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        textarea { width: 100%; height: 120px; background: #1c313a; color: #55efc4; border: none; border-radius: 10px; padding: 10px; box-sizing: border-box; font-family: monospace; }
        .btn { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 50px; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; font-weight: bold; cursor: pointer; font-size: 1em; }
        
        #status { margin-top: 10px; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="header">
        <h1>K-Store</h1>
        <p>کارگەی زیرەکی دروستکردنی ئەپ</p>
    </div>

    <div class="store-grid">
        <div class="store-card" onclick="alert('بەشی سیستەم و پڕۆگرام')">⚙️<br>سیستەم</div>
        <div class="store-card" onclick="alert('بەشی یارییەکان')">🎮<br>یاری</div>
        <div class="store-card" onclick="alert('بەشی ئەپەکان')">📱<br>ئەپەکان</div>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline></video>
    </div>
    <div id="status">⏳ خەریکە کامێرا دەکرێتەوە...</div>

    <div class="build-section">
        <h3>🚀 دروستکردنی APK</h3>
        <textarea id="codeEditor" placeholder="کۆدی پایتۆن لێرە دابنێ..."></textarea>
        <button class="btn" onclick="buildApp()">ناردن بۆ مەکینەی Buildozer</button>
    </div>

    <script>
        // چالاککردنی کامێرای دواوە بەبێ پرسیار
        async function startCamera() {
            const video = document.getElementById('video');
            const status = document.getElementById('status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } } 
                });
                video.srcObject = stream;
                status.innerText = "✅ کامێرای دواوە چالاکە";
                status.style.color = "#38ef7d";
            } catch (err) {
                try {
                    const fallback = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = fallback;
                    status.innerText = "✅ کامێرا چالاکە";
                } catch (e) {
                    status.innerText = "❌ کامێرا مۆڵەتی نییە";
                    status.style.color = "#ff4d4d";
                }
            }
        }

        // فەرمانی دروستکردنی ئەپ
        function buildApp() {
            const code = document.getElementById('codeEditor').value;
            if(!code) { alert("تکایە سەرەتا کۆدەکە بنووسە!"); return; }
            alert("کۆدەکە ناردرا بۆ GitHub Actions! مەکینەی Buildozer دەستی بەکار کرد.");
            // لێرە دەتوانیت پەیوەندی بە API گیتھابەوە بکەیت
        }

        window.onload = startCamera;
    </script>
</body>
</html>
