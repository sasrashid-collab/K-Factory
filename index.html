<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K_Store QR Scanner</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f2027; color: white; text-align: center; padding: 20px; margin: 0; }
        .header { margin-bottom: 20px; }
        .header h2 { color: #00d2ff; margin-bottom: 5px; }
        .video-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; border: 4px solid #00d2ff; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        video { width: 100%; display: block; }
        .btn { padding: 15px 40px; font-size: 1.1em; background: linear-gradient(45deg, #00d2ff, #3a7bd5); border: none; border-radius: 50px; cursor: pointer; margin-top: 25px; color: white; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn:active { transform: scale(0.95); }
        #status { margin-top: 20px; font-size: 1.1em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h2>K_Store</h2>
        <p>کارگەی زیرەکی ئەپڵیکەیشن</p>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <button class="btn" onclick="startCamera()">کردنەوەی کامێرای دواوە</button>
    <p id="status"></p>

    <script>
        async function startCamera() {
            const status = document.getElementById('status');
            const video = document.getElementById('video');
            
            status.innerText = "⏳ خەریکە دەکرێتەوە...";
            status.style.color = "#fdcb6e";

            const constraints = {
                video: {
                    // ئەم دێڕە ڕێگری دەکات لە پرسیارکردن و یەکسەر کامێرای دواوە هەڵدەبژێرێت
                    facingMode: { exact: "environment" } 
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                status.innerText = "✅ کامێرا چالاکە";
                status.style.color = "#38ef7d";
            } catch (err) {
                console.error("Error: ", err);
                
                // ئەگەر کامێرای دواوە بە 'exact' نەبوو، هەوڵ دەدەین بە شێوەیەکی گشتی بیکەینەوە
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = fallbackStream;
                    status.innerText = "✅ کامێرا چالاکە";
                    status.style.color = "#38ef7d";
                } catch (fallbackErr) {
                    status.innerText = "❌ ناتوانم کامێرا بکەمەوە. دڵنیابەرەوە مۆڵەتت داوە.";
                    status.style.color = "#ff4d4d";
                }
            }
        }
        
        // یەکسەر دوای باربوونی لاپەڕەکە هەوڵ بدات کامێراکە بکاتەوە
        window.onload = startCamera;
    </script>
</body>
</html>
