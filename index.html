<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K_Store Camera Test</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 500px; border: 3px solid #00d2ff; border-radius: 15px; background: #000; }
        .btn { padding: 15px 30px; font-size: 1.2em; background: #00d2ff; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>📸 تاقیکردنەوەی کامێرا</h2>
    <video id="video" autoplay playsinline></video>
    <br>
    <button class="btn" onclick="startCamera()">کردنەوەی کامێرا</button>
    <p id="status"></p>

    <script>
        async function startCamera() {
            const status = document.getElementById('status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
                status.innerText = "✅ کامێرا چالاک بوو!";
                status.style.color = "#38ef7d";
            } catch (err) {
                console.error(err);
                status.innerText = "❌ هەڵە: " + err.message;
                status.style.color = "#ff4d4d";
                alert("تکایە دڵنیابەرەوە کە مۆڵەتی کامێرات داوە بە براوسەرەکە.");
            }
        }
    </script>
</body>
</html>
