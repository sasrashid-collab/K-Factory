<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K_Store | App Factory</title>
    <style>
        :root { --main-color: #00d2ff; --bg-color: #0f2027; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-color); color: white; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .logo { font-size: 2.5em; font-weight: bold; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .lang-btns button { background: none; border: 1px solid var(--main-color); color: white; padding: 5px 15px; cursor: pointer; border-radius: 20px; margin: 5px; transition: 0.3s; }
        .lang-btns button:hover { background: var(--main-color); color: black; }
        textarea { width: 90%; height: 150px; margin-top: 20px; border-radius: 10px; border: none; padding: 15px; background: #1c313a; color: #00ff00; font-family: monospace; outline: none; border: 1px solid #333; }
        .build-btn { background: linear-gradient(to right, #11998e, #38ef7d); border: none; color: white; padding: 15px 30px; font-size: 1.1em; border-radius: 30px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3); width: 100%; }
        .footer { margin-top: 40px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

    <div class="lang-btns">
        <button onclick="setLang('ku')">Kurdî</button>
        <button onclick="setLang('ar')">العربية</button>
        <button onclick="setLang('en')">English</button>
    </div>

    <div class="container">
        <div class="logo">K_Store</div>
        <h2 id="header">بەخێرهاتی بۆ مەکینەی ئەپ</h2>
        <p id="desc">کۆدەکەت لێرە دابنێ و ئێمە بۆت دەکەینە ئەپی ڕاستەقینە (APK).</p>
        
        <textarea id="editor" placeholder="print('Hello K_Store')"></textarea>
        
        <button class="build-btn" onclick="buildApp()">🚀 دروستکردنی ئەپی APK</button>
    </div>

    <div class="footer">
        © 2026 K_Store | Powered by K_AI
    </div>

    <script>
        const content = {
            ku: { h: "بەخێرهاتی بۆ مەکینەی ئەپ", d: "کۆدەکەت لێرە دابنێ و ئێمە بۆت دەکەینە ئەپی ڕاستەقینە (APK).", dir: "rtl" },
            ar: { h: "مرحباً بك في مصنع التطبيقات", d: "ضع كودك هنا وسنقوم بتحويله إلى تطبيق أندرويد حقيقي.", dir: "rtl" },
            en: { h: "Welcome to App Factory", d: "Paste your code here and we will build a real APK for you.", dir: "ltr" }
        };

        function setLang(l) {
            document.getElementById('header').innerText = content[l].h;
            document.getElementById('desc').innerText = content[l].d;
            document.body.dir = content[l].dir;
        }

        async function buildApp() {
            const userCode = document.getElementById('editor').value;
            const token = "YOUR_GITHUB_TOKEN"; // کلیلە نهێنییەکەت لێرە دابنێ
            const repoOwner = "sasrashid-collab";
            const repoName = "K-Factory";

            if(token === "YOUR_GITHUB_TOKEN") {
                alert("⚠️ ئاگاداری: هێشتا کلیلە نهێنییەکەت (Token) دانەناوە!");
                return;
            }

            document.querySelector('.build-btn').innerText = "⏳ خەریکی ناردنە...";

            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        event_type: 'build_apk',
                        client_payload: { code: userCode }
                    })
                });

                if (response.ok) {
                    alert("✅ مەکینە دەستی بەکار کرد! دوای ١٠ خولەک ئەپەکەت ئامادە دەبێت.");
                } else {
                    alert("❌ کێشەیەک لە پەیوەندی هەبوو. دڵنیابەرەوە لە Tokenـەکە.");
                }
            } catch (error) {
                alert("⚠️ کێشەی ئینتەرنێت هەیە.");
            }
            document.querySelector('.build-btn').innerText = "🚀 دروستکردنی ئەپی APK";
        }
    </script>
</body>
</html>
