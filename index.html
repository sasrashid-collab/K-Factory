<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K_Store | Mobile App Factory</title>
    <style>
        :root { --main-blue: #00d2ff; --bg-dark: #0b0f19; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); color: white; text-align: center; margin: 0; padding: 15px; }
        .card { max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cam-frame { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid var(--main-blue); background: #000; margin-bottom: 15px; }
        video { width: 100%; display: block; }
        textarea { width: 100%; height: 150px; background: #162130; color: #55efc4; border: 1px solid #444; border-radius: 10px; padding: 10px; box-sizing: border-box; font-family: monospace; margin-top: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; width: 45%; }
        .btn-start { background: var(--main-blue); color: #000; }
        .btn-stop { background: #ff4d4d; color: white; }
        .btn-build { background: #38ef7d; color: #000; width: 100%; margin-top: 15px; font-size: 1.1em; }
        #status-bar { height: 20px; margin: 10px 0; font-size: 0.9em; color: var(--main-blue); }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: var(--main-blue); margin-top: 0;">K_Store 🚀</h2>
        
        <div class="cam-frame">
            <video id="video" autoplay playsinline></video>
        </div>

        <div id="status-bar"></div>

        <div style="display: flex; justify-content: center;">
            <button class="btn btn-start" onclick="startCamera()">▶ دەستپێکردن</button>
            <button class="btn btn-stop" onclick="stopCamera()">🛑 ڕاگرتن</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <p style="text-align: right; margin-bottom: 5px;">💻 کۆدی پایتۆن لێرە بنووسە:</p>
        <textarea id="pythonCode" placeholder="print('Hello World')"></textarea>
        
        <button class="btn btn-build" onclick="triggerBuild()">🛠 دروستکردنی ئەپی APK</button>
    </div>

    <script>
        let stream = null;

        async function startCamera() {
            const video = document.getElementById('video');
            const status = document.getElementById('status-bar');
            try {
                if(stream) stopCamera();
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: "environment" } } 
                });
                video.srcObject = stream;
                status.innerText = "✅ کامێرا ئامادەیە";
                setTimeout(() => { status.innerText = ""; }, 3000);
            } catch (err) {
                status.innerText = "❌ کامێرا نەکرایەوە!";
                status.style.color = "#ff4d4d";
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                document.getElementById('video').srcObject = null;
                stream = null;
                document.getElementById('status-bar').innerText = "🌑 کامێرا کوژایەوە";
                setTimeout(() => { document.getElementById('status-bar').innerText = ""; }, 2000);
            }
        }
