<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K_Store Smart Cam</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f19; color: white; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .camera-box { 
            position: relative; width: 100%; max-width: 450px; margin: 15px auto; 
            border: 3px solid #00d2ff; border-radius: 20px; overflow: hidden; 
            background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video { width: 100%; display: block; }
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 180px; height: 180px; border: 2px dashed rgba(0, 210, 255, 0.5);
            border-radius: 15px; pointer-events: none;
        }
        /* ستایلی نامەی ستاتوس (✔) */
        #status-container {
            display: none; position: relative; max-width: 300px; margin: 15px auto;
            background: rgba(56, 239, 125, 0.2); border: 1px solid #38ef7d;
            padding: 10px; border-radius: 10px; align-items: center; justify-content: space-between;
        }
        #status-text { color: #38ef7d; font-weight: bold; flex-grow: 1; }
        .close-btn { cursor: pointer; color: white; font-size: 20px; margin-right: 10px; background: none; border: none; }
        
        .btn { 
            padding: 12px 25px; background: #00d2ff; color: #0b0f19; 
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2 style="color: #00d2ff; margin-bottom: 5px;">K_Store</h2>
    <p style="font-size: 0.9em; opacity: 0.8;">کارگەی زیرەک</p>

    <div class="camera-box">
        <video id="video" autoplay playsinline></video>
        <div class="overlay"></div>
    </div>

    <div id="status-container">
        <span id="status-text"></span>
        <button class="close-btn" onclick="hideStatus()">×</button>
    </div>

    <button class="btn" onclick="openBackCamera()">🔄 دەستپێکردنەوە</button>

    <script>
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');

        async function openBackCamera() {
            const video = document.getElementById('video');
            try {
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: "environment" } } 
                });
                video.srcObject = stream;
                showStatus("✅ کامێرا چالاکە");
            } catch (err) {
                showStatus("❌ کامێرا نەکرایەوە");
                console.error(err);
            }
        }

        function showStatus(msg) {
            statusText.innerText = msg;
            statusContainer.style.display = 'flex';
            // دوای ٤ چرکە خۆی ون دەبێت ئەگەر لای نەنێیت
            setTimeout(() => { hideStatus(); }, 4000);
        }

        function hideStatus() {
            statusContainer.style.display = 'none';
        }

        window.addEventListener('load', openBackCamera);
    </script>
</body>
</html>
