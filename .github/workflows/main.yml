name: Build APK (K-Factory)
on:
  workflow_dispatch: # ئەمە ڕێگەت پێ دەدات بە دەستی کارای بکەیت

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython kivy kivymd

      - name: Build with Buildozer
        run: |
          # لێرە مەکینەکە دەست دەکات بە گۆڕینی کۆدی پایتۆن بۆ APK
          buildozer init
          # دەستکاری کردنی پێداویستییەکان بۆ ئەوەی KivyMD تێدابێت
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,kivymd,pillow/g' buildozer.spec
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: K-Store-App
          path: bin/*.apk
